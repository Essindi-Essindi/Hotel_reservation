
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
    
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
    
      - name: Build & push eureka
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-service-registry "./ServiceRegistry"
          docker push ${{ secrets.DOCKER_USERNAME }}/cloud-service-registry
    
      - name: Build & push user service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-user-management "./UserManagement"
          docker push ${{ secrets.DOCKER_USERNAME }}/cloud-user-management-lingua
    
      - name: Build & push reservation service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-reservation-management "./ReservationManagement"
          docker push ${{ secrets.DOCKER_USERNAME }}/cloud-reservation-management
    
      - name: Build & push hotel service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-hotel-management "./HotelManagement"
          docker push ${{ secrets.DOCKER_USERNAME }}/cloud-hotel-management

       - name: Build & push post service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-payment-management "./PaymentManagement"
          docker push ${{ secrets.DOCKER_USERNAME }}/cloud-payment-management

      - name: Build & push gateway
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-gateway "./Gateway"
          docker push ${{ secrets.DOCKER_USERNAME }}/cloud-gateway
    
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd app
            docker compose down
            docker compose pull
            docker image prune -af
            docker compose up -d
