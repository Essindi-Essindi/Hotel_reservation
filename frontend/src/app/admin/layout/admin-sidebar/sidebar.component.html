<div class="sidebar">

  <!-- Top Card -->
  <div class="sidebar-header">
    <h2>HOTEL ADMIN</h2>
  </div>

  <!-- Profile -->
  <div class="profile-btn">
    <i class="fas fa-user"></i>
    <span>Admin Profile</span>
  </div>

  <!-- Menu -->
  <div class="sidebar-menu">

    <div class="sidebar-item active" routerLink="/admin/dashboard">
      <div class="left">
        <i class="fas fa-chart-line"></i>
        <span>Dashboard</span>
      </div>
    </div>

    <div class="sidebar-item" routerLink="/admin/hotels">
      <div class="left">
        <i class="fas fa-hotel"></i>

    <div class="sidebar-item" routerLink="/admin/payments">
      <div class="left">
        <i class="fas fa-credit-card"></i>

      </div>
    </div>

    <div class="sidebar-item" routerLink="/admin/reports">
      <div class="left">
        <i class="fas fa-chart-pie"></i>
        <span>Reports</span>
      </div>

    <div class="sidebar-item" routerLink="/admin/settings">
      <div class="left">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </div>
    </div>

  </div>
