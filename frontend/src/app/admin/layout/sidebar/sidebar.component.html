<!-- sidebar.component.html -->
<div class="sidebar" [class.collapsed]="collapsed">
  <div class="sidebar-header">
    <i class="fas fa-parking"></i>
    <span>ParkEase</span>
  </div>

  <button class="toggle-btn" (click)="onToggle()">
    <i class="fas fa-chevron-left" [class.fa-chevron-right]="collapsed"></i>
  </button>

  <div class="sidebar-menu">
    <div class="sidebar-item" routerLink="/admin/dashboard" routerLinkActive="active">
      <i class="fas fa-tachometer-alt"></i>
      <span>Dashboard</span>
    </div>
    <div class="sidebar-item" routerLink="/admin/bookings" routerLinkActive="active">
      <i class="fas fa-calendar-check"></i>
      <span>Bookings</span>
    </div>
  </div>
</div>
