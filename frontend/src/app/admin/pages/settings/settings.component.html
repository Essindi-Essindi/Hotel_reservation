<!-- Settings Page — mirrors Lovable Settings.tsx -->

<div class="page-space">

  <!-- Page Header -->
  <app-page-header
    eyebrow="Configuration"
    title="Settings"
    description="Manage your hotel branding, pricing, and notification preferences."
    [hasActions]="true"
  >
    <button class="btn-luxury" (click)="save()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      Save Changes
    </button>
  </app-page-header>

  <!-- Save toast -->
  <div class="toast" [class.visible]="saved">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    Settings saved successfully
  </div>

  <!-- Layout grid -->
  <div class="settings-grid">

    <!-- Hotel Information (2/3 width) -->
    <div class="luxury-card p-6 col-span-2">
      <div class="card-heading">
        <div class="card-icon card-icon--primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/>
            <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/>
            <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/>
            <path d="M10 6h4"/><path d="M10 10h4"/>
          </svg>
        </div>
        <div>
          <p class="card-eyebrow">General</p>
          <h3 class="card-title">Hotel Information</h3>
        </div>
      </div>

      <div class="form-grid-2">
        <div class="field-group">
          <label class="field-label">Brand Name</label>
          <input class="field-input" [(ngModel)]="brandName" />
        </div>
        <div class="field-group">
          <label class="field-label">Contact Email</label>
          <input class="field-input" type="email" [(ngModel)]="contactEmail" />
        </div>
        <div class="field-group">
          <label class="field-label">Phone</label>
          <input class="field-input" [(ngModel)]="phone" />
        </div>
        <div class="field-group">
          <label class="field-label">Country</label>
          <input class="field-input" [(ngModel)]="country" />
        </div>
        <div class="field-group col-span-full">
          <label class="field-label">Address</label>
          <textarea class="field-textarea" [(ngModel)]="address" rows="2"></textarea>
        </div>
      </div>
    </div>

    <!-- Theme (1/3 width) -->
    <div class="luxury-card p-6">
      <div class="card-heading">
        <div class="card-icon card-icon--accent">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/>
            <circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/>
            <circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/>
            <circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/>
            <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.47-1.125-.29-.289-.438-.652-.438-1.042a1.75 1.75 0 0 1 1.75-1.75h1.65c3.45 0 6.25-2.8 6.25-6.25C21.965 6.012 17.461 2 12 2z"/>
          </svg>
        </div>
        <div>
          <p class="card-eyebrow">Branding</p>
          <h3 class="card-title">Theme</h3>
        </div>
      </div>

      <div class="theme-section">
        <label class="field-label">Primary Color</label>
        <div class="color-swatches">
          <button
            *ngFor="let c of ['swatch-primary','swatch-accent','swatch-info','swatch-success']; let i = index"
            class="swatch"
            [class]="c"
            [class.active]="selectedTheme === i"
            (click)="selectedTheme = i"
          ></button>
        </div>
      </div>

      <div class="theme-section">
        <label class="field-label">Logo Style</label>
        <div class="logo-style-grid">
          <button
            class="logo-style-btn"
            [class.active]="selectedLogo === 'Diamond'"
            (click)="selectedLogo = 'Diamond'"
          >Diamond</button>
          <button
            class="logo-style-btn"
            [class.active]="selectedLogo === 'Crest'"
            (click)="selectedLogo = 'Crest'"
          >Crest</button>
        </div>
      </div>
    </div>

    <!-- Pricing (2/3 width) -->
    <div class="luxury-card p-6 col-span-2">
      <div class="card-heading">
        <div class="card-icon card-icon--success">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <div>
          <p class="card-eyebrow">Rates</p>
          <h3 class="card-title">Pricing</h3>
        </div>
      </div>

      <div class="form-grid-2">
        <div class="field-group">
          <label class="field-label">Price per Hour</label>
          <div class="prefix-wrap">
            <span class="prefix">$</span>
            <input class="field-input prefix-input" type="number" [(ngModel)]="pricePerHour" />
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Default Price per Night</label>
          <div class="prefix-wrap">
            <span class="prefix">$</span>
            <input class="field-input prefix-input" type="number" [(ngModel)]="pricePerNight" />
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Currency</label>
          <input class="field-input" [(ngModel)]="currency" />
        </div>
        <div class="field-group">
          <label class="field-label">Tax Rate (%)</label>
          <input class="field-input" type="number" [(ngModel)]="taxRate" />
        </div>
      </div>
    </div>

    <!-- Notifications (1/3 width) -->
    <div class="luxury-card p-6">
      <div class="card-heading">
        <div class="card-icon card-icon--warning">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
          </svg>
        </div>
        <div>
          <p class="card-eyebrow">Alerts</p>
          <h3 class="card-title">Notifications</h3>
        </div>
      </div>

      <div class="notif-list">
        <div *ngFor="let n of notifications; let last = last" class="notif-row">
          <div class="notif-row-content">
            <div class="notif-text">
              <p class="notif-label">{{ n.label }}</p>
              <p class="notif-desc">{{ n.desc }}</p>
            </div>
            <!-- Toggle switch (mirrors Lovable Switch) -->
            <button
              class="toggle-switch"
              [class.on]="n.enabled"
              (click)="n.enabled = !n.enabled"
              [attr.aria-checked]="n.enabled"
              role="switch"
            >
              <span class="toggle-thumb"></span>
            </button>
          </div>
          <div class="notif-divider" *ngIf="!last"></div>
        </div>
      </div>
    </div>

  </div>
</div>
