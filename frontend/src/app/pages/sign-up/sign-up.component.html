<app-auth-shell
  [image]="hotelLobby"
  imageAlt="Grand hotel lobby"
  eyebrow="Join the Place-Finder"
  title="Create Account"
  subtitle="Unlock member rates across thousands of curated hotels.">

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="signup-form">

    <!-- Success banner -->
    <div *ngIf="successMessage" class="success-banner">
      ✓ {{ successMessage }}
    </div>

    <!-- Full name -->
    <div class="field">
      <label for="name" class="field-label tracking-luxury">Full name</label>
      <input
        id="name"
        type="text"
        formControlName="name"
        autocomplete="name"
        placeholder="Jane Doe"
        class="field-input"
        [class.field-input--error]="submitted && name.invalid">
      <span *ngIf="errorFor(name, 'Name')" class="field-error font-serif">{{ errorFor(name, 'Name') }}</span>
    </div>

    <!-- Username -->
    <div class="field">
      <label for="username" class="field-label tracking-luxury">Username</label>
      <input
        id="username"
        type="text"
        formControlName="username"
        autocomplete="username"
        placeholder="janedoe"
        class="field-input"
        [class.field-input--error]="submitted && username.invalid">
      <span *ngIf="errorFor(username, 'Username')" class="field-error font-serif">{{ errorFor(username, 'Username') }}</span>
    </div>

    <!-- Email -->
    <div class="field">
      <label for="email" class="field-label tracking-luxury">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        autocomplete="email"
        placeholder="guest@placefinder.com"
        class="field-input"
        [class.field-input--error]="submitted && email.invalid">
      <span *ngIf="errorFor(email, 'Email')" class="field-error font-serif">{{ errorFor(email, 'Email') }}</span>
    </div>

    <!-- Phone (optional) -->
    <div class="field">
      <label for="phone" class="field-label tracking-luxury">Phone <span class="optional">(optional)</span></label>
      <input
        id="phone"
        type="tel"
        formControlName="phone"
        autocomplete="tel"
        placeholder="+1 555 123 4567"
        class="field-input"
        [class.field-input--error]="submitted && phone.invalid">
      <span *ngIf="errorFor(phone, 'Phone')" class="field-error font-serif">{{ errorFor(phone, 'Phone') }}</span>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password" class="field-label tracking-luxury">Password</label>
      <div class="field-password-wrap">
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          autocomplete="new-password"
          placeholder="At least 8 characters"
          class="field-input"
          [class.field-input--error]="submitted && password.invalid">
        <button type="button" class="toggle-pw" (click)="showPassword = !showPassword" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
          <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg *ngIf="showPassword"  xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <span *ngIf="errorFor(password, 'Password')" class="field-error font-serif">{{ errorFor(password, 'Password') }}</span>
    </div>

    <!-- Terms -->
    <label class="terms-label font-serif">
      <input type="checkbox" formControlName="terms" class="check-input" />
      <span>
        I agree to the
        <a href="#" class="terms-link">Terms</a> and
        <a href="#" class="terms-link">Privacy Policy</a>.
      </span>
    </label>
    <span *ngIf="submitted && terms.invalid" class="field-error font-serif">{{ errorFor(terms, 'Terms') }}</span>

    <!-- Submit -->
    <button type="submit" class="btn-primary">CREATE ACCOUNT</button>

    <!-- Footer link -->
    <p class="form-footer font-serif">
      Already a member?
      <a routerLink="/sign-in" class="form-footer-link">Sign in</a>
    </p>

  </form>

</app-auth-shell>
