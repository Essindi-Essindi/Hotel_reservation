
<header class="bg-gradient-primary">
    <div class="container">
        <nav>
            <div class="logo">
                <i class="fas fa-map-marker-alt"></i>
                <span>PlaceFinder</span>
            </div>
            <div class="nav-links">
                <a routerLink="/reservation" routerLinkActive="active">Reserve</a>
                <a routerLink="/history" routerLinkActive="active">History</a>
                <a href="#" (click)="onLogout($event)">Logout</a>
                <div class="user-profile-area" (click)="openProfileModal()">
                    <span class="user-name">{{userName}}</span>
                    <i class="fa-solid fa-circle-user user-icon"></i>
                </div>
            </div>
        </nav>
    </div>
</header>

<div class="modal-overlay" [class.active]="showProfileModal" (click)="closeProfileModal()">
    <div class="modal-container" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h3><i class="fas fa-user-edit"></i> Edit Profile</h3>
            <button class="close-modal" (click)="closeProfileModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Full Name</label>
                <input type="text" [(ngModel)]="editProfile.name" placeholder="Your full name" autocomplete="name">
            </div>
            <div class="form-group">
                <label><i class="fas fa-at"></i> Username</label>
                <input type="text" [(ngModel)]="editProfile.username" placeholder="username" autocomplete="username">
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" [(ngModel)]="editProfile.email" placeholder="email@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone-alt"></i> Phone Number</label>
                <input type="tel" [(ngModel)]="editProfile.phone" placeholder="+1 234 567 8900" autocomplete="tel">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" (click)="cancelEdit()">Cancel</button>
                <button class="btn btn-primary" (click)="saveProfile()">Save Changes</button>
            </div>
        </div>
    </div>
</div>
